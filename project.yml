name: mkey
options:
  bundleIdPrefix: vn.mkey
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    CLANG_CXX_LANGUAGE_STANDARD: c++17
    CLANG_CXX_LIBRARY: libc++
    GCC_C_LANGUAGE_STANDARD: gnu11
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    DEVELOPMENT_TEAM: ""
    ENABLE_HARDENED_RUNTIME: NO

targets:
  mkey:
    type: application
    platform: macOS
    sources:
      - path: Sources/Engine
        excludes:
          - "platforms/linux.h"
          - "platforms/win32.h"
      - path: Sources/Platform
      - path: Sources/App
      - path: Sources/Support
        includes:
          - "Assets.xcassets"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: vn.mkey.app
        PRODUCT_NAME: mkey
        INFOPLIST_FILE: Sources/Support/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sources/Support/mkey.entitlements
        SWIFT_OBJC_BRIDGING_HEADER: Sources/Support/mkey-Bridging-Header.h
        HEADER_SEARCH_PATHS:
          - "$(SRCROOT)/Sources/Engine"
          - "$(SRCROOT)/Sources/Platform"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        COMBINE_HIDPI_IMAGES: YES
        GCC_WARN_64_TO_32_BIT_CONVERSION: NO
    dependencies:
      - sdk: Carbon.framework
      - sdk: Cocoa.framework
      - sdk: ServiceManagement.framework
